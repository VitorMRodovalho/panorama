name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main, 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: panorama
          POSTGRES_PASSWORD: panorama
          POSTGRES_DB: panorama
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panorama"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgres://panorama:panorama@localhost:5432/panorama?schema=public
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      - name: Bootstrap DB (extensions + roles)
        run: PGPASSWORD=panorama psql -h localhost -U panorama -d panorama -v ON_ERROR_STOP=1 -f infra/docker/postgres-init.sql
        env:
          PGPASSWORD: panorama
      - run: pnpm --filter @panorama/core-api prisma:deploy
      - name: Apply RLS policies
        run: |
          for rls in apps/core-api/prisma/migrations/*/rls.sql; do
            echo "Applying $rls"
            PGPASSWORD=panorama psql -h localhost -U panorama -d panorama -v ON_ERROR_STOP=1 -f "$rls"
          done
      - run: pnpm test

  i18n-coverage:
    name: i18n coverage (EN = PT-BR = ES)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm i18n:check

  license-check:
    name: Dependency licence scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm license:check

  ensure-community-complete:
    name: Community flows work without Enterprise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Asserts Enterprise packages are not referenced in Community tests.
      - run: 'grep -R "panorama-enterprise" apps/ packages/ --include="*.ts" --include="*.tsx" --include="*.json" && exit 1 || exit 0'

  container-scan:
    name: Container image SCA
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
