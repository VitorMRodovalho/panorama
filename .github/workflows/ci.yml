name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main, 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma Client's types (e.g. $transaction) are only generated once
      # `prisma generate` runs. pnpm's isolation + non-approved build scripts
      # mean the postinstall hook does not fire — do it explicitly.
      - run: pnpm --filter @panorama/core-api prisma:generate
      - run: pnpm lint
      - run: pnpm typecheck
      # Closes Wave 1 ARCH-11 / #71 — every Prisma migration folder
      # must contain migration.sql + ROLLBACK.md + exactly one of
      # rls.sql / NO_RLS.md. Fails CI on any drift.
      - run: pnpm migrations:check
      # Closes Wave 2 RLS-CI / #58 — every prisma.runAsSuperAdmin
      # call site is budgeted in .runAsSuperAdmin.allowlist.json.
      # Drift requires either migrating to runInTenant or raising
      # the budget with security-reviewer sign-off.
      - run: pnpm rls:allowlist-check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: panorama
          POSTGRES_PASSWORD: panorama
          POSTGRES_DB: panorama
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U panorama"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      # MailHog — outbound SMTP target. v1.0.1 is permanent (project dormant).
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025
      # MinIO is NOT a service container here — GH Actions' service
      # schema doesn't support `command:`, but MinIO's image needs
      # `server /data` to start. Started via `docker run -d` in the
      # "Start MinIO" step below (same docker daemon as services).
    env:
      DATABASE_URL: postgres://panorama:panorama@localhost:5432/panorama?schema=public
      REDIS_URL: redis://localhost:6379/0
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET_PHOTOS: panorama-photos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      S3_ALLOW_PRIVATE_ENDPOINT: "true"
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install psql client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      # Start MinIO + create the panorama-photos bucket. Uses `docker
      # run -d` instead of a service container because GH Actions
      # services lack a `command:` knob, and MinIO needs `server /data`.
      # Bucket creation via mc is idempotent (`--ignore-existing`).
      - name: Start MinIO + create bucket
        run: |
          set -euo pipefail
          docker run -d --name minio --network host \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data
          # Wait for MinIO readiness (max 30s).
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              echo "MinIO did not become ready in 30s; dumping logs:"
              docker logs minio
              exit 1
            fi
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc:RELEASE.2025-08-13T08-35-41Z \
            mb --ignore-existing local/panorama-photos
      - name: Bootstrap DB (extensions + roles)
        run: PGPASSWORD=panorama psql -h localhost -U panorama -d panorama -v ON_ERROR_STOP=1 -f infra/docker/postgres-init.sql
        env:
          PGPASSWORD: panorama
      - run: pnpm --filter @panorama/core-api prisma:generate
      # Build workspace packages so vite/vitest can resolve them.
      # @panorama/shared + migrator + i18n + ui-kit + plugin-sdk are
      # all consumed by core-api tests; their tsc emits to `dist/`
      # which package.json's `main`/`exports` point at. Without the
      # build step vitest fails to resolve `@panorama/shared` at
      # test-load time and 21 e2e files collect zero tests.
      - run: pnpm --filter '!@panorama/core-api' --filter '!@panorama/web' build
      - run: pnpm --filter @panorama/core-api prisma:deploy
      - name: Apply RLS policies
        run: |
          for rls in apps/core-api/prisma/migrations/*/rls.sql; do
            echo "Applying $rls"
            PGPASSWORD=panorama psql -h localhost -U panorama -d panorama -v ON_ERROR_STOP=1 -f "$rls"
          done
      # Diagnostic: confirm panorama_app role + GUC mechanics work end-to-end.
      # If this prints a tenant uuid, RLS is fully wired. If it prints NULL or
      # errors, the remaining test failures are CI-environment-specific
      # postgres init drift that needs investigation. Logged as CI debug,
      # not gating.
      - name: Diagnostic — RLS GUC + panorama_app
        run: |
          set -euo pipefail
          PGPASSWORD=panorama psql -h localhost -U panorama -d panorama -v ON_ERROR_STOP=1 -c "
            SELECT rolname, rolbypassrls, rolcanlogin
              FROM pg_roles
             WHERE rolname LIKE 'panorama%'
             ORDER BY rolname;
          "
          PGPASSWORD=panorama psql -h localhost -U panorama_app -d panorama -v ON_ERROR_STOP=1 -c "
            BEGIN;
            SET LOCAL panorama.current_tenant = '11111111-1111-4111-8111-111111111111';
            SELECT panorama_current_tenant() AS gut_check;
            SELECT current_setting('panorama.current_tenant', true) AS guc_value;
            COMMIT;
          " || echo "panorama_app GUC diagnostic FAILED — investigate before relying on test signal"
      # Coverage instead of bare test — same surface, plus a v8 report.
      # See vitest.config.ts §coverage for the threshold floors. Floors
      # ratchet UP only (see CONTRIBUTING.md). Wave 2d.E / #70.
      - name: Run tests with coverage
        run: pnpm --filter @panorama/core-api test:coverage
      - name: Publish coverage summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary="apps/core-api/coverage/coverage-summary.json"
          if [ ! -f "$summary" ]; then
            echo "_coverage-summary.json not produced — coverage step likely failed earlier._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Coverage — apps/core-api"
            echo
            echo "| Metric | Pct | Covered / Total |"
            echo "|---|---:|---:|"
            for k in statements branches functions lines; do
              pct=$(jq -r ".total.$k.pct" "$summary")
              covered=$(jq -r ".total.$k.covered" "$summary")
              total=$(jq -r ".total.$k.total" "$summary")
              echo "| ${k^} | ${pct}% | ${covered} / ${total} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-api-coverage
          path: apps/core-api/coverage/
          retention-days: 14

  i18n-coverage:
    name: i18n coverage (EN = PT-BR = ES)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm i18n:check

  license-check:
    name: Dependency licence scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm license:check

  ensure-community-complete:
    name: Community flows work without Enterprise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Asserts Enterprise packages are not referenced in Community sources.
      # See scripts/ensure-community-complete.ts (Wave 2d.D / #69 / replaces
      # the prior `grep ... && exit 1 || exit 0` which masked grep's exit 2).
      - run: pnpm ensure:community-complete

  container-scan:
    name: Filesystem SCA (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    # Wave 2d.C / #68 — two-pass pattern.
    #
    # 1. SARIF pass (exit-code: 0): always uploads to the Security tab
    #    so the dashboard reflects current state regardless of whether
    #    the PR fails the blocking gate. `if: always()` on the upload
    #    keeps the SARIF current even if pass 2 errors.
    # 2. Blocking pass (exit-code: 1, --severity HIGH,CRITICAL,
    #    --ignore-unfixed): fails the build on real risk. Suppression
    #    of unreachable advisories goes through .trivyignore at the
    #    repo root (Wave 3b / #83) — every entry has a justification
    #    header per the template; PRs adding bare CVE ids without
    #    headers must be rejected.
    #
    # Pinned action version (was @master) per OSSF Scorecard
    # pinned-deps. Bumps go through deliberate review.
    steps:
      - uses: actions/checkout@v4
      - name: Trivy report (SARIF, never blocks)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
      - name: Trivy gate (blocks on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
